<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>App Install Problem - Arif Toolbox</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

:root{
  --accent:#00ffe5;
  --accent2:#00bcd4;
  --bg:#000000;
  --text:#0ff;
  --blur-bg:rgba(0,255,255,0.10);
}

body{
  margin:0;
  padding:16px 16px 80px;
  font-family:'Orbitron','Segoe UI Emoji';
  background:linear-gradient(140deg,#000 0%, #001a1a 100%);
  color:var(--text);
}


/* ===== HEADER ===== */
.header{
  background:rgba(0,255,255,0.12);
  backdrop-filter:blur(14px);
  border-bottom:2px solid var(--accent);
  padding:15px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
  box-shadow:0 0 15px #00ffee55;
  animation:fade .7s ease forwards;
  opacity:0;
}
.back-btn{
  padding:9px 14px;
  border-radius:10px;
  border:1px solid var(--accent);
  background:rgba(0,255,255,0.08);
  color:var(--text);
  cursor:pointer;
  transition:.4s;
}
.back-btn:hover{
  background:var(--accent);
  color:#000;
  box-shadow:0 0 18px #00ffeecc;
}
.page-title{
  flex:1;
  text-align:center;
  font-size:23px;
  font-weight:700;
  text-shadow:0 0 7px #00fff966;
}


/* ===== CARD ===== */
.card{
  background:var(--blur-bg);
  border:1px solid var(--accent2);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  margin-bottom:22px;
  box-shadow:0 0 20px #00fff133;
  transition:.4s;
  animation:fadeUp .8s ease forwards;
  opacity:0;
}
.card:hover{
  transform:scale(1.015);
  box-shadow:0 0 20px #00ffee88;
}
@keyframes fadeUp{
 from{opacity:0; transform:translateY(25px);}
 to{opacity:1; transform:translateY(0);}
}

/* Title */
.title{
  font-size:21px;
  font-weight:700;
  margin-bottom:10px;
  text-shadow:0 0 5px #00fff2aa;
}

/* Video */
.video-box iframe{
  width:100%;
  height:240px;
  border-radius:14px;
  border:1px solid var(--accent);
  box-shadow:0 0 18px #00ffee88;
}

/* Step Instruction */
.step-box{
  margin-top:20px;
  background:rgba(0,255,255,0.07);
  padding:15px;
  border-radius:14px;
  border:1px solid var(--accent);
  font-size:16px;
  box-shadow:0 0 12px #00ffee55;
}
.step{
  margin-bottom:12px;
  padding:10px;
  border-left:3px solid var(--accent);
  background:rgba(0,255,255,0.05);
  border-radius:8px;
}
.step b{
  color:#fff;
}

@keyframes fade{
  from{opacity:0;} to{opacity:1;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" onclick="goBack()">⬅</button>
  <div class="page-title">App Install Problem</div>
  <div style="width:40px"></div>
</div>

<!-- VIDEO CARD -->
<div class="card video-box">
  <div class="title">📺 How to Install the App (Play Protect OFF)</div>
  <iframe src="https://www.youtube.com/embed/IoP7nH3GbkI" allowfullscreen></iframe>

  <!-- Steps -->
  <div class="step-box">
    <div class="title" style="font-size:18px;">📝 Step-by-Step Guide</div>

    <div class="step"><b>1.</b> Play Store খুলুন।</div>
    <div class="step"><b>2.</b> উপরের ডান দিকে আপনার প্রোফাইল আইকনে ক্লিক করুন।</div>
    <div class="step"><b>3.</b> "Play Protect" এ যান।</div>
    <div class="step"><b>4.</b> "Settings" এ ক্লিক করুন।</div>
    <div class="step"><b>5.</b> <b>"Scan apps with Play Protect"</b> অপশন বন্ধ করে দিন।</div>
    <div class="step"><b>6.</b> এখন আপনার অ্যাপ সহজে ইন্সটল হবে।</div>

  </div>
</div>

<script>
function goBack(){ window.location = "app bar.html"; }
</script>

</body>
</html>
