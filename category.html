<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category - Arif Toolbox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto&display=swap');

body {
  margin:0;
  font-family:'Orbitron','Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif;
  background:#0a0a0a;
  color:#0ff;
  transition:0.3s;
  padding-bottom:70px;
}

.header {
  text-align:center;
  font-size:30px;
  margin:20px 0;
  color:#00ffc8;
  text-shadow:0 0 5px #00ffc8,0 0 15px #00ffc8,0 0 25px #00ffc8;
  animation: float 3s infinite alternate ease-in-out;
}
@keyframes float { from{transform:translateY(0);} to{transform:translateY(-10px);} }

.nav .active{

position:relative;

background:
linear-gradient(
145deg,
#00ffc8,
#00bfff
);

color:#000;

font-weight:bold;

transform:translateY(-4px);

border-color:#00ffc8;

box-shadow:
0 0 10px #00ffc8,
0 0 25px #00ffc8,
0 0 45px rgba(0,255,200,.5);

text-shadow:none;

overflow:hidden;
}

/* GLOW ANIMATION */

.nav .active{
background:#ffffff;
color:#000;
font-weight:bold;
border-color:#00ffc8;
box-shadow:
0 0 10px rgba(0,255,200,.6);
transform:translateY(-2px);
transition:.25s ease;
}
/* NORMAL NAV */
.nav div{
transition:.25s ease;
}
/* HOVER */
.nav div:hover{
transform:translateY(-2px);
box-shadow:
0 0 12px currentColor;
}

#search {
  width:calc(100% - 30px);
  padding:12px;
  border-radius:10px;
  border:1px solid currentColor;
  background: rgba(0,255,255,0.05);
  color:inherit;
  font-size:16px;
  margin:0 15px 20px 15px;
  outline:none;
  box-sizing:border-box;
}
.category-box {
  border:1px solid currentColor;
  border-radius:12px;
  padding:15px;
  margin:0 15px 20px 15px;
  box-shadow:0 0 5px currentColor;
}
.category-box h3 {
  margin:0 0 10px 0;
  font-size:18px;
}

.tool-btn {
  display:block;
  position:relative;
  margin:6px 0;
  padding:11px 40px 11px 11px;
  border-radius:8px;
  text-decoration:none;
  color:inherit;
  border:1px solid currentColor;
  background: rgba(0,255,255,0.05);
  transition:0.3s;
  box-shadow:0 0 5px currentColor;
  font-size:16px;
}
.tool-btn:hover {
  background: rgba(0,255,255,0.2);
  transform:translateY(-3px);
  box-shadow:0 0 15px currentColor,0 0 30px currentColor;
}

.favorite-btn {
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  cursor:pointer;
  background:none;
  border:none;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background: rgba(0,255,255,0.05);
  border-top:1px solid currentColor;
  padding:15px 0;
  backdrop-filter: blur(12px);
  z-index:1000;
}
.nav div {
  color:inherit;
  font-size:15px;
  font-weight:bold;
  padding:9px 15px;
  border-radius:10px;
  cursor:pointer;
  border:2px solid currentColor;
  box-shadow:0 0 10px currentColor;
}

#favoritesSection {
  border:2px dashed #0ff;
  border-radius:12px;
  padding:12px;
  margin:0 15px 20px 15px;
}
#favoritesSection h3 { margin:0 0 10px 0; }
</style>
</head>

<body>

<div class="header">📂 Categories</div>
<input type="text" id="search" placeholder="🔍 Search tools...">

<div id="favoritesSection">
  <h3>❤️ Favorites</h3>
  <div id="favoritesList"></div>
</div>

<div id="categoryList">

  <div class="category-box">
    <h3>🛡️ Hacking Tools</h3>

    <a class="tool-btn" data-id="hacking-prank" href="https://hacking-app1.netlify.app/">💻 Hacking Prank
      <button class="favorite-btn">🤍</button>
    </a>

    <a class="tool-btn" data-id="hacking-apps" href="Hacking app html/app bar.html">📱 Hacking apps
      <button class="favorite-btn">🤍</button>
    </a>

    <a class="tool-btn" data-id="hacking-quiz" href="linuxcmd.html">🧠 Hacking Quiz
      <button class="favorite-btn">🤍</button>
    </a>

    <a class="tool-btn" data-id="linux-cmd" href="linuxcmd.html">🧾 Linux Commands
      <button class="favorite-btn">🤍</button>
    </a>
  </div>

  <div class="category-box">
    <h3>🛠️ Utility Tools</h3>

    <a class="tool-btn" data-id="battery" href="tools/battery.html">🔋 Battery Info
      <button class="favorite-btn">🤍</button>
    </a>

    <a class="tool-btn" data-id="day-finder" href="tools/daytodayfinder.html">📅 Day Finder
      <button class="favorite-btn">🤍</button>
    </a>

    <a class="tool-btn" data-id="timer" href="tools/timer.html">⏱️ Stopwatch / Timer
      <button class="favorite-btn">🤍</button>
    </a>

    <a class="tool-btn" data-id="password" href="tools/password.html">🔐 Password Strength
      <button class="favorite-btn">🤍</button>
    </a>
  </div>

</div>

<div class="nav">
  <div onclick="location='index.html'">🏠 Home</div>
<div class="active"onclick="location='category.html'">📂 Category </div>
  <div onclick="location='settings.html'">⚙️ Settings</div>
</div>

<script>

// ===== LOAD SETTINGS (FIXED) =====
function applySettings(){
  const dark = localStorage.getItem('darkMode') === 'true';
  const color = localStorage.getItem('textColor') || '#0ff';
  const font  = localStorage.getItem('fontStyle') || "'Orbitron', sans-serif";

  document.body.style.color = color;
  document.body.style.fontFamily =
    `${font}, 'Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif`;

  document.querySelectorAll('.tool-btn').forEach(btn=>{
    btn.style.borderColor = color;
    btn.style.boxShadow = `0 0 5px ${color}`;
  });

  document.querySelectorAll('.nav div').forEach(nav=>{
    nav.style.borderColor = color;
    nav.style.boxShadow = `0 0 10px ${color}`;
  });
}

// page load + settings change
window.addEventListener('load', applySettings);
window.addEventListener('storage', applySettings);

// ===== FAVORITE SYSTEM (FINAL, FIXED) =====
const favoritesList = document.getElementById('favoritesList');
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

function saveFavorites(){
  localStorage.setItem('favorites', JSON.stringify(favorites));
}

function renderFavorites(){
  favoritesList.innerHTML = '';
  favorites.forEach(id=>{
    const tool = document.querySelector(`.tool-btn[data-id="${id}"]`);
    if(tool){
      const clone = tool.cloneNode(true);
      clone.querySelector('.favorite-btn').remove();
      favoritesList.appendChild(clone);
    }
  });
}

document.querySelectorAll('.tool-btn').forEach(tool=>{
  const btn = tool.querySelector('.favorite-btn');
  const id = tool.dataset.id;

  if(favorites.includes(id)){
    btn.textContent = '❤️';
  }

  btn.addEventListener('click', e=>{
    e.preventDefault();
    e.stopPropagation();

    if(favorites.includes(id)){
      favorites = favorites.filter(f => f !== id);
      btn.textContent = '🤍';
    }else{
      favorites.push(id);
      btn.textContent = '❤️';
    }
    saveFavorites();
    renderFavorites();
  });
});

renderFavorites();

// ===== SEARCH =====
document.getElementById('search').addEventListener('input', e=>{
  const v = e.target.value.toLowerCase();
  document.querySelectorAll('.category-box').forEach(cat=>{
    let show=false;
    cat.querySelectorAll('.tool-btn').forEach(t=>{
      const ok = t.textContent.toLowerCase().includes(v);
      t.style.display = ok ? 'block' : 'none';
      if(ok) show=true;
    });
    cat.style.display = show ? 'block' : 'none';
  });
});
</script>

</body>
</html>
