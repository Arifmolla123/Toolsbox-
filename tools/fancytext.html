<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arif Ultra Fancy Text App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ===== BODY & GLOBAL ===== */
body{
  margin:0;
  padding:0;
  font-family: 'Share Tech Mono', monospace;
  background:#0a0a0a;
  color:#00ffcc;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* ===== APP CARD ===== */
.app-card{
  background:#111;
  border:2px solid #00ffcc;
  border-radius:15px;
  padding:25px;
  width:95%;
  max-width:540px;
  box-shadow:0 0 20px #00ffcc, 0 0 40px #00ffcc inset;
  animation:glow 2s infinite alternate;
}

/* ===== GLOW ANIMATION ===== */
@keyframes glow{
  from{box-shadow:0 0 20px #00ffcc, 0 0 40px #00ffcc inset;}
  to{box-shadow:0 0 40px #00ffcc, 0 0 80px #00ffcc inset;}
}

/* ===== HEADLINE ===== */
h1{
  text-align:center;
  font-size:22px;
  text-shadow:0 0 10px #00ffcc;
  margin-bottom:20px;
}

/* ===== TEXTAREA & INPUTS ===== */
textarea, input, select, button{
  width:100%;
  margin:8px 0;
  padding:12px;
  background:#111;
  color:#00ffcc;
  border:1px solid #00ffcc;
  border-radius:8px;
  font-family:inherit;
  font-size:14px;
  outline:none;
}

textarea{height:120px; resize:none;}

/* ===== BUTTONS ===== */
button{
  cursor:pointer;
  border:none;
  transition:0.3s;
  font-weight:bold;
}
button:hover{
  background:#00ffcc;
  color:#000;
  box-shadow:0 0 10px #00ffcc;
}

/* ===== ROW BUTTONS ===== */
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.row button{
  flex:1;
}

/* ===== PREVIEW BOX ===== */
.preview{
  border:1px dashed #00ffcc;
  padding:15px;
  margin-top:12px;
  max-height:220px;
  overflow:auto;
  background:#111;
  border-radius:8px;
  font-size:16px;
  white-space: pre-wrap;
  box-shadow: inset 0 0 10px #00ffcc;
}

/* ===== STATS ===== */
.stats{
  font-size:12px;
  opacity:0.7;
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-top:12px;
}
</style>
</head>
<body>

<div class="app-card">
<h1>рҹҺЁ Cyber Fancy Text </h1>

<textarea id="text" placeholder="Write your text here..."></textarea>

<input type="number" id="repeat" min="1" max="200" value="1" placeholder="Repeat count">

<select id="mode">
  <option value="newline">New Line</option>
  <option value="space">Space</option>
</select>

<select id="style">
  <option value="normal">Normal</option>
  <option value="bold">Bold</option>
  <option value="italic">Italic</option>
  <option value="mono">Monospace</option>
  <option value="small">Small Caps</option>
  <option value="reverse">Reverse</option>
  <option value="glitch">Glitch</option>
  <option value="upside">Upside-down</option>
</select>

<div class="row">
  <button onclick="generate()">Generate</button>
  <button onclick="copyText()">Copy</button>
</div>

<div class="row">
  <button onclick="sendWhatsApp()">WhatsApp</button>
  <button onclick="sendTelegram()">Telegram</button>
  <button onclick="sendMessenger()">Messenger</button>
</div>

<div class="stats">
  <span id="char">Chars: 0</span>
  <span id="lines">Lines: 0</span>
</div>

<div class="preview" id="preview">Live preview will appear hereвҖҰ</div>

<div class="footer">вҡЎ Powered by @Hacking Cyber</div>
</div>

<script>
let finalText = "";

/* ===== Fancy Styles ===== */
const styleMap = {
  normal: t => t,
  bold: t => t.replace(/[a-z]/gi, c =>
    "рқ—®рқ—Ҝрқ—°рқ—ұрқ—Ірқ—ірқ—ҙрқ—өрқ—¶рқ—·рқ—ёрқ—№рқ—әрқ—»рқ—јрқ—Ҫрқ—ҫрқ—ҝрқҳҖрқҳҒрқҳӮрқҳғрқҳ„рқҳ…рқҳҶрқҳҮ"[c.toLowerCase().charCodeAt(0)-97] ||
    "рқ—”рқ—•рқ—–рқ——рқ—ҳрқ—ҷрқ—ҡрқ—ӣрқ—ңрқ—қрқ—һрқ—ҹрқ— рқ—Ўрқ—ўрқ—Јрқ—Өрқ—Ҙрқ—Ұрқ—§рқ—Ёрқ—©рқ—Әрқ—«рқ—¬рқ—ӯ"[c.charCodeAt(0)-65]
  ),
  italic: t => t.replace(/[a-z]/gi, c =>
    "рқҳўрқҳЈрқҳӨрқҳҘрқҳҰрқҳ§рқҳЁрқҳ©рқҳӘрқҳ«рқҳ¬рқҳӯрқҳ®рқҳҜрқҳ°рқҳұрқҳІрқҳірқҳҙрқҳөрқҳ¶рқҳ·рқҳёрқҳ№рқҳәрқҳ»"[c.toLowerCase().charCodeAt(0)-97] ||
    "рқҳҲрқҳүрқҳҠрқҳӢрқҳҢрқҳҚрқҳҺрқҳҸрқҳҗрқҳ‘рқҳ’рқҳ“рқҳ”рқҳ•рқҳ–рқҳ—рқҳҳрқҳҷрқҳҡрқҳӣрқҳңрқҳқрқҳһрқҳҹрқҳ рқҳЎ"[c.charCodeAt(0)-65]
  ),
  mono: t => t.replace(/[a-z]/gi, c =>
    "рқҡҠрқҡӢрқҡҢрқҡҚрқҡҺрқҡҸрқҡҗрқҡ‘рқҡ’рқҡ“рқҡ”рқҡ•рқҡ–рқҡ—рқҡҳрқҡҷрқҡҡрқҡӣрқҡңрқҡқрқҡһрқҡҹрқҡ рқҡЎрқҡўрқҡЈ"[c.toLowerCase().charCodeAt(0)-97] ||
    "рқҷ°рқҷұрқҷІрқҷірқҷҙрқҷөрқҷ¶рқҷ·рқҷёрқҷ№рқҷәрқҷ»рқҷјрқҷҪрқҷҫрқҷҝрқҡҖрқҡҒрқҡӮрқҡғрқҡ„рқҡ…рқҡҶрқҡҮрқҡҲрқҡү"[c.charCodeAt(0)-65]
  ),
  small: t => t.replace(/[a-z]/g, c =>
    "бҙҖКҷбҙ„бҙ…бҙҮкң°ЙўКңЙӘбҙҠбҙӢКҹбҙҚЙҙбҙҸбҙҳЗ«КҖsбҙӣбҙңбҙ бҙЎxКҸбҙў"[c.charCodeAt(0)-97]
  ),
  reverse: t => t.split("").reverse().join(""),
  glitch: t => t.split("").map(c => c + ['М·','Мҙ','М¶','Нў','Н '][Math.floor(Math.random()*5)]).join(""),
  upside: t => t.split("").map(c => upsideMap[c] || c).reverse().join("")
};

const upsideMap = {
  a:'Йҗ',b:'q',c:'Й”',d:'p',e:'Зқ',f:'Йҹ',g:'Жғ',h:'ЙҘ',i:'бҙү',j:'Йҫ',
  k:'Кһ',l:'Кғ',m:'ЙҜ',n:'u',o:'o',p:'d',q:'b',r:'Й№',s:'s',t:'КҮ',
  u:'n',v:'КҢ',w:'КҚ',x:'x',y:'КҺ',z:'z',
  A:'вҲҖ',B:'рҗҗ’',C:'ЖҶ',D:'в—–',E:'ЖҺ',F:'в„І',G:'ЧӨ',H:'H',I:'I',J:'Еҝ',
  K:'Кһ',L:'ЛҘ',M:'W',N:'N',O:'O',P:'ФҖ',Q:'Q',R:'R',S:'S',T:'в”ҙ',
  U:'вҲ©',V:'Оӣ',W:'M',X:'X',Y:'в…„',Z:'Z'
};

function generate(){
  let txt = document.getElementById("text").value;
  let rep = parseInt(document.getElementById("repeat").value);
  let mode = document.getElementById("mode").value;

  if(!txt) return alert("Write something first!");

  let joiner = mode === "newline" ? "\n" : " ";
  let arr = [];
  for(let i=0;i<rep;i++){
    arr.push(styleMap[document.getElementById("style").value](txt));
  }

  finalText = arr.join(joiner);
  document.getElementById("preview").innerText = finalText;
  document.getElementById("char").innerText = "Chars: " + finalText.length;
  document.getElementById("lines").innerText = "Lines: " + arr.length;
  navigator.clipboard.writeText(finalText);
}

function copyText(){
  if(!finalText) return alert("Generate first!");
  navigator.clipboard.writeText(finalText);
  alert("Copied! (WhatsApp-ready Unicode text)");
}

function sendWhatsApp(){
  if(!finalText) return alert("Generate first!");
  let num = prompt("Enter WhatsApp number with country code:");
  if(!num) return;
  window.open("https://wa.me/" + num + "?text=" + encodeURIComponent(finalText), "_blank");
}

function sendTelegram(){
  if(!finalText) return alert("Generate first!");
  window.open("https://t.me/share/url?url=&text=" + encodeURIComponent(finalText), "_blank");
}

function sendMessenger(){
  if(!finalText) return alert("Generate first!");
  window.open("https://www.messenger.com/t/?message=" + encodeURIComponent(finalText), "_blank");
}
</script>

</body>
</html>
