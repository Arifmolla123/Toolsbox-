<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>QR কোড জেনারেটর - আরিফ</title>
  <style>
    body {
      font-family: 'Noto Sans Bengali', sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
      transition: 0.4s;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: #222;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 15px #000;
    }
    input, select, button {
      margin: 10px 0;
      padding: 10px;
      width: 90%;
      font-size: 1em;
      border: none;
      border-radius: 10px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    canvas {
      margin-top: 20px;
      border: 2px solid #444;
      background: #fff;
      border-radius: 10px;
    }
    button {
      background: #00aaff;
      color: white;
      cursor: pointer;
    }
    .light-mode {
      background: #f7f7f7;
      color: #111;
    }
    .light-mode .container {
      background: #fff;
    }
    #developer {
      margin-top: 20px;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>🔳 QR কোড জেনারেটর</h1>
  <div class="container">
    <label for="text">QR কোডে যা থাকবে:</label>
    <input type="text" id="text" placeholder="যেমন: https://arif.com">

    <label>QR কোড সাইজ:</label>
    <select id="size">
      <option value="150">150x150</option>
      <option value="200">200x200</option>
      <option value="250" selected>250x250</option>
      <option value="300">300x300</option>
    </select>

    <label>রঙ নির্বাচন:</label>
    <input type="color" id="foreground" value="#000000">
    <input type="color" id="background" value="#ffffff">

    <button onclick="generateQR()">✅ কোড বানাও</button>
    <button id="downloadBtn" onclick="downloadQR()" disabled>📥 ডাউনলোড</button>
    <button onclick="toggleMode()">🌓 মোড বদলাও</button>

    <canvas id="qrcode"></canvas>
  </div>

  <p id="developer">ডেভেলপার: <strong>আরিফ</strong></p>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
    let qrGenerated = false;

    function generateQR() {
      const text = document.getElementById("text").value.trim();
      const size = parseInt(document.getElementById("size").value);
      const fg = document.getElementById("foreground").value;
      const bg = document.getElementById("background").value;
      const canvas = document.getElementById("qrcode");

      if (!text) {
        alert("দয়া করে QR কোডে কিছু লিখুন!");
        return;
      }

      QRCode.toCanvas(canvas, text, {
        width: size,
        color: {
          dark: fg,
          light: bg
        }
      }, function (error) {
        if (error) {
          alert("QR কোড বানাতে সমস্যা হয়েছে!");
          console.error(error);
          return;
        }
        qrGenerated = true;
        document.getElementById("downloadBtn").disabled = false;
      });
    }

    function downloadQR() {
      if (!qrGenerated) {
        alert("QR কোড আগে বানাও, তারপর ডাউনলোড করো!");
        return;
      }

      const canvas = document.getElementById("qrcode");
      const link = document.createElement("a");
      link.download = "arif_qrcode.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function toggleMode() {
      document.body.classList.toggle("light-mode");
    }
  </script>
</body>
</html>
