<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Cyber Live Device Monitor</title>

<style>
body {
    background: radial-gradient(circle at top, #0f1420, #06080f);
    color: #baf7ff;
    font-family: "Orbitron", sans-serif;
    margin: 0;
    padding: 25px;
}

h1 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 25px;
    color: #00f7ff;
    text-shadow: 0 0 20px #00eaff;
}

.box {
    max-width: 650px;
    margin: auto;
    background: rgba(0, 255, 255, 0.05);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 25px;

    border: 1px solid rgba(0, 255, 255, 0.25);
    box-shadow: 0 0 20px #00eeff33, inset 0 0 20px #00eeff22;

    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
}

.box::before, .box::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #00eaff, transparent);
    top: 0;
    animation: scan 3s infinite linear;
}

.box::after {
    bottom: 0;
    top: unset;
    animation: scanReverse 3s infinite linear;
}

@keyframes scan {
    0% { left: -100%; }
    100% { left: 100%; }
}
@keyframes scanReverse {
    0% { left: 100%; }
    100% { left: -100%; }
}

.title {
    font-size: 18px;
    color: #00eaff;
    margin-bottom: 6px;
    text-shadow: 0 0 10px #00eaff88;
}

.value {
    font-size: 15px;
    color: #d9ffff;
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: #777;
}
</style>
</head>

<body>

<h1> Live Cyber Device Monitor</h1>

<div class="box">
  <div class="title">Device Name</div>
  <div class="value" id="device"></div>
</div>

<div class="box">
  <div class="title">Battery</div>
  <div class="value" id="battery"></div>
</div>

<div class="box">
  <div class="title">Charging Status</div>
  <div class="value" id="charging"></div>
</div>

<div class="box">
  <div class="title">Storage</div>
  <div class="value" id="storage"></div>
</div>

<div class="box">
  <div class="title">RAM</div>
  <div class="value" id="ram"></div>
</div>

<div class="box">
  <div class="title">CPU Cores</div>
  <div class="value" id="cpu"></div>
</div>

<div class="box">
  <div class="title">Network Status</div>
  <div class="value" id="net"></div>
</div>

<div class="box">
  <div class="title">Motion Sensor (Live)</div>
  <div class="value" id="motion"></div>
</div>

<div class="box">
  <div class="title">Orientation (Live)</div>
  <div class="value" id="orientation"></div>
</div>

<p class="footer">Developed by <b>Arif</b>  Premium Cyber Edition</p>

<script>

// Initial device name
document.getElementById("device").textContent = navigator.userAgent;

// LIVE BATTERY
navigator.getBattery().then(b => {
    function updateBattery() {
        document.getElementById("battery").textContent = Math.round(b.level * 100) + "%";
        document.getElementById("charging").textContent = b.charging ? "Yes " : "No";
    }

    updateBattery();
    b.addEventListener("levelchange", updateBattery);
    b.addEventListener("chargingchange", updateBattery);
});

/* LIVE STORAGE */
setInterval(() => {
    if (navigator.storage && navigator.storage.estimate) {
        navigator.storage.estimate().then(s => {
            let total = (s.quota / 1e9).toFixed(2);
            let free = ((s.quota - s.usage) / 1e9).toFixed(2);
            document.getElementById("storage").textContent =
                `Total: ${total} GB | Free: ${free} GB`;
        });
    }
}, 2000);

/* RAM */
document.getElementById("ram").textContent =
    navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Not Supported";

/* CPU */
document.getElementById("cpu").textContent = navigator.hardwareConcurrency + " Cores";

/* LIVE NETWORK */
setInterval(() => {
    document.getElementById("net").textContent =
        navigator.onLine ? "Online" : "Offline";
}, 1000);

/* LIVE MOTION SENSOR */
if ("DeviceMotionEvent" in window) {
    window.addEventListener("devicemotion", e => {
        document.getElementById("motion").innerHTML =
            `X: ${e.acceleration.x?.toFixed(2)}<br>
             Y: ${e.acceleration.y?.toFixed(2)}<br>
             Z: ${e.acceleration.z?.toFixed(2)}`;
    });
} else {
    document.getElementById("motion").textContent = "Not Supported";
}

/* LIVE ORIENTATION */
if ("DeviceOrientationEvent" in window) {
    window.addEventListener("deviceorientation", e => {
        document.getElementById("orientation").innerHTML =
            `Alpha: ${e.alpha?.toFixed(1)}ř<br>
             Beta: ${e.beta?.toFixed(1)}ř<br>
             Gamma: ${e.gamma?.toFixed(1)}ř`;
    });
} else {
    document.getElementById("orientation").textContent = "Not Supported";
}

</script>

</body>
</html>
