<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIF Day Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Sans Bengali',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
overflow:hidden;
color:white;
padding:20px;
}

body::before{
content:'';
position:absolute;
width:400px;
height:400px;
background:#00e5ff33;
border-radius:50%;
top:-100px;
left:-100px;
filter:blur(80px);
}

body::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:#00ff9533;
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(80px);
}

.container{
width:100%;
max-width:500px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.1);
padding:35px;
border-radius:30px;
box-shadow:0 10px 40px rgba(0,0,0,.4);
position:relative;
z-index:1;
animation:show .5s ease;
}

@keyframes show{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
font-size:2rem;
font-weight:bold;
margin-bottom:10px;
background:linear-gradient(45deg,#00e5ff,#00ff95);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#ddd;
margin-bottom:25px;
}

.live-time{
text-align:center;
font-size:1.1rem;
margin-bottom:20px;
color:#00ffff;
font-weight:bold;
}

.input-box{
margin-bottom:20px;
}

.input-box label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.input-box input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.1);
color:white;
font-size:1rem;
}

.find-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#00e5ff,#00ff95);
font-size:1rem;
font-weight:bold;
cursor:pointer;
transition:.3s;
color:black;
}

.find-btn:hover{
transform:scale(1.03);
}

.result{
margin-top:25px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,.08);
display:none;
animation:fade .4s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.result h2{
margin-bottom:15px;
color:#00ffff;
}

.result p{
margin:10px 0;
font-size:1rem;
color:#eee;
}

.footer{
text-align:center;
margin-top:20px;
color:#bbb;
font-size:.95rem;
}

.theme-btn{
position:absolute;
top:15px;
right:15px;
background:rgba(255,255,255,.1);
border:none;
color:white;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
}

.light{
background:#f1f5f9 !important;
color:black !important;
}

.light .container{
background:rgba(255,255,255,.7);
color:black;
}

.light input{
color:black;
}

.light .result{
background:rgba(0,0,0,.05);
}

</style>
</head>

<body>

<div class="container">

<button class="theme-btn" onclick="toggleTheme()"></button>

<div class="logo">
 DAY TO DAY FINDER
</div>

<div class="subtitle">
     
</div>

<div class="live-time" id="clock">
Loading Time...
</div>

<div class="input-box">
<label>  </label>
<input type="date" id="dateInput">
</div>

<button class="find-btn" onclick="findDay()">
 Find Day
</button>

<div class="result" id="resultBox">

<h2> Result</h2>

<p id="dayName"></p>
<p id="weekend"></p>
<p id="dayNumber"></p>
<p id="remaining"></p>
<p id="leapYear"></p>

</div>

<div class="footer">
Developed By <b>Arif</b>
</div>

</div>

<script>

function updateClock(){

const now = new Date();

document.getElementById("clock").innerText =
now.toLocaleTimeString('bn-BD',{
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

}

setInterval(updateClock,1000);
updateClock();

function findDay(){

const input = document.getElementById("dateInput").value;

if(!input){
alert("  !");
return;
}

const date = new Date(input);

const days = [
"",
"",
"",
"",
"",
"",
""
];

const months = [
31,28,31,30,31,30,
31,31,30,31,30,31
];

const day = days[date.getDay()];

document.getElementById("dayName").innerHTML =
" : <b>"+day+"</b>";

const isWeekend =
(date.getDay()==5 || date.getDay()==6)
? " "
: " ";

document.getElementById("weekend").innerHTML =
" Weekend: <b>"+isWeekend+"</b>";

let start = new Date(date.getFullYear(),0,0);
let diff = date - start;

let oneDay = 1000*60*60*24;

let dayNum = Math.floor(diff/oneDay);

document.getElementById("dayNumber").innerHTML =
"  "+dayNum+"  ";

const endYear = new Date(date.getFullYear(),11,31);

const remain =
Math.ceil((endYear-date)/oneDay);

document.getElementById("remaining").innerHTML =
"  : "+remain+" ";

const leap =
(date.getFullYear()%4==0)
? "Leap Year "
: "Leap Year  ";

document.getElementById("leapYear").innerHTML =
" "+leap;

document.getElementById("resultBox").style.display =
"block";

}

function toggleTheme(){

document.body.classList.toggle("light");

}

</script>

</body>
</html>
