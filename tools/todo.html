<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arif Advanced Todo App</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Sans Bengali',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.title{
font-size:2rem;
font-weight:bold;
}

.theme-btn{
padding:10px 15px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
font-weight:bold;
}

.top-box{
background:#1e293b;
padding:20px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.3);
margin-bottom:20px;
}

.input-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.input-group input,
.input-group select{
padding:12px;
border:none;
border-radius:12px;
background:#334155;
color:white;
font-size:1rem;
}

#taskInput{
flex:1;
min-width:200px;
}

.add-btn{
padding:12px 20px;
border:none;
border-radius:12px;
background:#06b6d4;
color:white;
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#334155;
padding:15px;
border-radius:15px;
text-align:center;
}

.card h2{
font-size:1.8rem;
margin-bottom:5px;
}

.search-box{
margin:20px 0;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.search-box input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

.filter-btns{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filter-btns button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#334155;
color:white;
cursor:pointer;
}

.filter-btns button.active{
background:#06b6d4;
}

.task-list{
display:flex;
flex-direction:column;
gap:15px;
}

.task{
background:#1e293b;
padding:15px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
animation:fade .3s ease;
border-left:5px solid #06b6d4;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.task.done{
opacity:.6;
text-decoration:line-through;
border-left:5px solid #22c55e;
}

.task-left{
flex:1;
}

.task-title{
font-size:1.1rem;
font-weight:bold;
margin-bottom:5px;
}

.task-time{
font-size:.85rem;
color:#94a3b8;
}

.priority{
padding:4px 10px;
border-radius:20px;
font-size:.8rem;
display:inline-block;
margin-top:5px;
}

.high{
background:#dc2626;
}

.medium{
background:#f59e0b;
}

.low{
background:#22c55e;
}

.task-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.task-buttons button{
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
font-size:1rem;
}

.done-btn{
background:#22c55e;
color:white;
}

.edit-btn{
background:#f59e0b;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

.empty{
text-align:center;
margin-top:30px;
color:#94a3b8;
}

.footer{
text-align:center;
margin-top:30px;
color:#94a3b8;
}

.dark-light{
background:white;
color:black;
}

.progress{
margin-top:20px;
background:#334155;
border-radius:20px;
overflow:hidden;
height:20px;
}

.progress-bar{
height:100%;
width:0%;
background:#22c55e;
transition:.3s;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">📝 Advance Todo List</div>
<button class="theme-btn" onclick="toggleTheme()"> </button>
</div>

<div class="top-box">

<div class="input-group">
<input type="text" id="taskInput" placeholder="  ...">

<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<input type="date" id="date">

<button class="add-btn" onclick="addTask()"> Add</button>
</div>

<div class="stats">

<div class="card">
<h2 id="totalTasks">0</h2>
<p> </p>
</div>

<div class="card">
<h2 id="completedTasks">0</h2>
<p></p>
</div>

<div class="card">
<h2 id="pendingTasks">0</h2>
<p></p>
</div>

</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="  ..." onkeyup="renderTasks()">
</div>

<div class="filter-btns">
<button class="active" onclick="setFilter('all', this)"></button>
<button onclick="setFilter('pending', this)">Pending</button>
<button onclick="setFilter('done', this)">Done</button>
</div>

<div class="task-list" id="taskList"></div>

<div class="empty" id="emptyMsg">
     
</div>

<div class="footer">
: <b></b>
</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("arif_advanced_tasks")) || [];
let currentFilter = "all";

function saveTasks(){
localStorage.setItem("arif_advanced_tasks", JSON.stringify(tasks));
updateStats();
}

function addTask(){

const input = document.getElementById("taskInput");
const priority = document.getElementById("priority").value;
const date = document.getElementById("date").value;

if(input.value.trim() === ""){
alert(" !");
return;
}

tasks.unshift({
id:Date.now(),
text:input.value,
done:false,
priority,
date,
created:new Date().toLocaleString()
});

input.value="";

saveTasks();
renderTasks();
}

function renderTasks(){

const list = document.getElementById("taskList");
const search = document.getElementById("searchInput").value.toLowerCase();

list.innerHTML="";

let filtered = tasks.filter(task=>{

const matchSearch = task.text.toLowerCase().includes(search);

if(currentFilter==="done"){
return task.done && matchSearch;
}

if(currentFilter==="pending"){
return !task.done && matchSearch;
}

return matchSearch;

});

document.getElementById("emptyMsg").style.display =
filtered.length ? "none" : "block";

filtered.forEach(task=>{

const div = document.createElement("div");
div.className = `task ${task.done ? 'done':''}`;

div.innerHTML = `
<div class="task-left">

<div class="task-title">${task.text}</div>

<div class="task-time">
 ${task.date || "No date"} <br>
 ${task.created}
</div>

<div class="priority ${task.priority}">
${task.priority.toUpperCase()}
</div>

</div>

<div class="task-buttons">

<button class="done-btn" onclick="toggleTask(${task.id})">
${task.done ? '':''}
</button>

<button class="edit-btn" onclick="editTask(${task.id})">

</button>

<button class="delete-btn" onclick="deleteTask(${task.id})">

</button>

</div>
`;

list.appendChild(div);

});

updateStats();
}

function toggleTask(id){

tasks = tasks.map(task=>{
if(task.id===id){
task.done=!task.done;
}
return task;
});

saveTasks();
renderTasks();
}

function deleteTask(id){

if(confirm("   ?")){
tasks = tasks.filter(task=>task.id!==id);
saveTasks();
renderTasks();
}

}

function editTask(id){

const task = tasks.find(t=>t.id===id);

const newText = prompt("  :", task.text);

if(newText){

task.text = newText;

saveTasks();
renderTasks();

}

}

function updateStats(){

const total = tasks.length;
const completed = tasks.filter(t=>t.done).length;
const pending = total - completed;

document.getElementById("totalTasks").innerText = total;
document.getElementById("completedTasks").innerText = completed;
document.getElementById("pendingTasks").innerText = pending;

let progress = total ? (completed/total)*100 : 0;
document.getElementById("progressBar").style.width = progress + "%";

}

function setFilter(type,btn){

currentFilter = type;

document.querySelectorAll(".filter-btns button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

renderTasks();

}

function toggleTheme(){

document.body.classList.toggle("dark-light");

}

renderTasks();

</script>

</body>
</html>
