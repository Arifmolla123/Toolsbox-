<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Battery Info Tool</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .battery-container {
      margin: auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      max-width: 400px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    .battery-icon {
      font-size: 70px;
      margin: 20px 0;
    }
    .bar {
      height: 20px;
      width: 100%;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }
    .fill {
      height: 100%;
      background: limegreen;
      width: 0%;
      transition: width 0.5s;
    }
    .label {
      margin-top: 10px;
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <h1>🔋 Battery Info Tool</h1>
  <div class="battery-container">
    <div class="battery-icon" id="charging-status">⚡</div>
    <div class="bar">
      <div class="fill" id="battery-level"></div>
    </div>
    <div class="label" id="level-text">Battery Level: 0%</div>
    <div class="label" id="charging-text">Charging: No</div>
    <div class="label" id="time-text">Charging Time: Unknown</div>
    <div class="label" id="discharge-text">Discharging Time: Unknown</div>
  </div>

  <script>
    navigator.getBattery().then(function(battery) {
      function updateAll() {
        const level = Math.round(battery.level * 100);
        document.getElementById("battery-level").style.width = level + "%";
        document.getElementById("level-text").textContent = "Battery Level: " + level + "%";
        document.getElementById("charging-text").textContent = "Charging: " + (battery.charging ? "Yes" : "No");
        document.getElementById("charging-status").textContent = battery.charging ? "⚡" : "🔋";

        document.getElementById("time-text").textContent =
          battery.chargingTime === Infinity
            ? "Charging Time: Calculating..."
            : "Charging Time: " + Math.round(battery.chargingTime / 60) + " min";

        document.getElementById("discharge-text").textContent =
          battery.dischargingTime === Infinity
            ? "Discharging Time: Calculating..."
            : "Discharging Time: " + Math.round(battery.dischargingTime / 60) + " min";
      }

      updateAll();

      battery.addEventListener("levelchange", updateAll);
      battery.addEventListener("chargingchange", updateAll);
      battery.addEventListener("chargingtimechange", updateAll);
      battery.addEventListener("dischargingtimechange", updateAll);
    });
  </script>
  ...
    </div> <!-- battery-container end -->
    
    <p style="margin-top: 30px; font-size: 1em; color: #ccc;">
      Developed with ❤️ by <strong>Arif</strong>
    </p>
  </body>
</html>
</body>
</html>
