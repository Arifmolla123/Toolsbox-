<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Info - Arif Toolbox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto&display=swap');

* { box-sizing: border-box; margin:0; padding:0; }

body {
    font-family:'Orbitron','Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif;
    background:#0a0a0a;
    color:#0ff;
    padding:20px 10px 100px 10px;
    transition:0.3s;
}

/* Back Button */
.back-btn {
    position:fixed;
    top:14px;
    left:2px;
    background:rgba(0,255,255,0.1);
    color:#0ff;
    padding:2px 10px;
    border-radius:10px;
    border:2px solid #0ff;
    box-shadow:0 0 5px #0ff, 0 0 10px #0ff;
    cursor:pointer;
    font-weight:bold;
    z-index:2000;
}
.back-btn:hover {
    transform:translateY(-3px);
    box-shadow:0 0 15px #0ff, 0 0 35px #0ff;
}

/* App Logo */
.app-logo {
    text-align:center; 
    margin-bottom:20px;
}
.app-logo img {
    width:120px; 
    height:120px; 
    border-radius:20px; 
    box-shadow:0 0 15px #00ffc8, 0 0 30px #00ffc8, 0 0 50px #00ffc8;
}

/* Neon Animated Title */
.title {
    font-size:32px;
    text-align:center;
    margin-bottom:30px;
    color:#00ffc8;
    text-shadow:0 0 5px #00ffc8, 0 0 15px #00ffc8, 0 0 30px #00ffc8;
    animation: float 3s infinite alternate ease-in-out;
}
@keyframes float { from{transform:translateY(0);} to{transform:translateY(-8px);} }

/* Info Card */
.info-card {
    background: rgba(0,255,255,0.05);
    border: 2px solid currentColor;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow:0 0 15px currentColor;
    transition:0.3s;
}
.info-card:hover { 
    box-shadow:0 0 25px currentColor,0 0 50px currentColor;
    transform: translateY(-5px);
}
.info-card h3 {
    font-size:22px;
    margin-bottom:10px;
    text-shadow:0 0 5px currentColor,0 0 15px currentColor;
}
.info-card p {
    font-size:16px;
    word-wrap: break-word;
}




/* Dark Mode */
body.dark-mode { background:#111; color:#0f0; }
body.dark-mode .copy-btn:hover { background:#0a0; }
</style>
</head>
<body>

<!-- BACK BUTTON -->
<div class="back-btn" onclick="window.location='settings.html'">⬅ Back</div>

<!-- TITLE -->
<div class="title">📱 App Info</div>

<!-- INFO CARDS -->
<div class="info-card">
    <h3>App Name</h3>
    <p>Arif Toolbox </p>
</div>

<div class="info-card">
    <h3>Developer</h3>
    <p>Arif Molla</p>
</div>

<div class="info-card">
    <h3>Description</h3>
    <p>Here you will find all types of hacking-style processes, and with Arif ToolBox you will be able to do many powerful tasks easily.”
⚡🛠️💻</p>
</div>
<div class="info-card">
    <h3>Rate This App ⭐</h3>
    <p>Your rating helps us improve</p>

    <button onclick="window.location.href='rating/rating.html'"
        style="
          margin-top:12px;
          padding:14px 18px;
          width:100%;
          font-size:18px;
          font-weight:bold;
          border-radius:14px;
          border:none;
          cursor:pointer;
          background:#00ffc8;
          color:#000;
          box-shadow:0 0 20px #00ffc8, 0 0 40px #00ffc8;
        ">
        ⭐ Rate Now
    </button>
</div>

<script>
// SETTINGS LOGIC
function applySettings(){
    const dark = JSON.parse(localStorage.getItem('darkMode'));
    const color = localStorage.getItem('textColor')||'#0ff';
    const font = localStorage.getItem('fontStyle')||"'Orbitron', sans-serif";

    if(dark) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');

    document.body.style.color = color;
    document.body.style.fontFamily = font + ", 'Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif";

    document.querySelectorAll('.info-card, .nav div, .title, .copy-btn, .back-btn').forEach(el=>{
        el.style.color = color;
        el.style.fontFamily = font + ", 'Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif";
        if(el.classList.contains('info-card')) el.style.borderColor=color;
        if(el.classList.contains('copy-btn')) el.style.background=color;
        if(el.classList.contains('back-btn')) el.style.borderColor=color;
    });
}

window.addEventListener('load', applySettings);
window.addEventListener('storage', applySettings);
</script>

</body>
</html>
