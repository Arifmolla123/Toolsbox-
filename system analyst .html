<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-black via-purple-900 to-black flex items-center justify-center min-h-screen font-[Poppins] text-white">

<div class="bg-white/10 backdrop-blur-xl p-6 rounded-2xl w-96 shadow-2xl border border-purple-500 text-center">

  <h1 class="text-2xl font-bold mb-2 animate-pulse">😈 Anonymous Message</h1>
  <p id="username" class="text-gray-300 mb-3"></p>

  <!-- TEXTAREA -->
  <textarea id="msg" maxlength="150"
    placeholder="Type your secret message..."
    class="w-full p-3 rounded-lg text-black mb-1"></textarea>

  <p id="count" class="text-xs text-gray-400 mb-3">0 / 150</p>

  <!-- SEND BUTTON -->
  <button onclick="sendMsg()" 
    class="bg-purple-600 px-4 py-2 rounded w-full hover:bg-purple-700 transition">
    Send Message
  </button>

  <p id="status" class="mt-3 text-sm"></p>

  <!-- HINT -->
  <div id="hintBox" class="hidden mt-4 text-xs text-yellow-300"></div>

  <hr class="my-4 border-gray-600">

  <!-- LINK GENERATOR -->
  <input id="myname" placeholder="Your username"
    class="w-full p-2 text-black rounded mb-2">

  <button onclick="generateLink()" 
    class="bg-green-600 px-4 py-2 rounded w-full">
    Generate Link
  </button>

  <p id="link" class="mt-3 text-xs break-all text-gray-300"></p>

  <button onclick="copyLink()" 
    class="mt-2 bg-blue-600 px-4 py-2 rounded w-full">
    Copy Link
  </button>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const user = params.get("user") || "unknown";
document.getElementById("username").innerText = "Send to: " + user;

// character counter
const msgBox = document.getElementById("msg");
msgBox.addEventListener("input", ()=>{
  document.getElementById("count").innerText = msgBox.value.length + " / 150";
});

// spam control
let lastSent = 0;

// random hints
const hints = [
  "👀 Someone close to you...",
  "😏 Maybe your best friend...",
  "🔥 Someone who knows you well...",
  "🤫 A secret admirer...",
  "😈 Think carefully..."
];

function sendMsg(){

  const now = Date.now();
  if(now - lastSent < 5000){
    document.getElementById("status").innerText="⏱️ Wait 5 sec...";
    return;
  }

  const message = msgBox.value;

  if(message.length < 1){
    document.getElementById("status").innerText="❌ Empty message";
    return;
  }

  document.getElementById("status").innerText="Sending... ⏳";

  fetch("https://api.telegram.org/8193376363:AAFaDSLah6R-i_hkQY9fKyeYiudZJSNsLeg/sendMessage",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      chat_id:"6449981797",
      text:`📩 Anonymous\n👤 To: ${user}\n💬 ${message}`
    })
  })
  .then(res=>res.json())
  .then(()=>{
    document.getElementById("status").innerText="✅ Sent!";
    msgBox.value="";
    document.getElementById("count").innerText="0 / 150";
    lastSent = now;

    // show random hint
    const randomHint = hints[Math.floor(Math.random()*hints.length)];
    const hintBox = document.getElementById("hintBox");
    hintBox.innerText = "🔍 Hint: " + randomHint;
    hintBox.classList.remove("hidden");
  })
  .catch(()=>{
    document.getElementById("status").innerText="❌ Error";
  });

}

// generate link
function generateLink(){
  const name = document.getElementById("myname").value;
  const url = window.location.origin + "/?user=" + name;
  document.getElementById("link").innerText = url;
}

// copy link
function copyLink(){
  const text = document.getElementById("link").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied ✔");
}
</script>

</body>
</html>
