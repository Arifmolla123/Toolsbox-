<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Arif Toolbox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto&display=swap');

body {
    margin:0;
    font-family: 'Orbitron','Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif;
    background:#0a0a0a;
    color:#0ff;
    padding:20px 15px 100px 15px;
    transition:0.3s;
}

.title {
    font-size:28px;
    text-align:center;
    color:#00ffc8;
    text-shadow:0 0 5px #00ffc8,0 0 15px #00ffc8,0 0 25px #00ffc8;
    margin-bottom:25px;
}

/* Setting Items */
.set-item {
    background: rgba(0,255,255,0.05);
    border:1px solid #0ff;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
    font-family:'Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif !important;
}

.set-item h4, .set-item span {
    margin:0;
}

.set-item button, select, input[type=color] {
    background: #0ff;
    border:none;
    color:#000;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}
.set-item button:hover, select:hover, input[type=color]:hover {
    background: #00bfa5;
}
.set-item .danger { background:red; color:#fff; }

/* Bottom Navigation */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background: rgba(0,255,255,0.05);
    border-top:1px solid #0ff;
    padding:15px 0;
    backdrop-filter: blur(12px);
    box-shadow:0 -2px 15px rgba(0,255,255,0.2);
    z-index:1000;
}
.nav div {
user-select: none;
    -webkit-user-select: none;
    color:inherit;
    font-size:15px;
    font-weight:bold;
    padding:9px 15px;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
    border:2px solid currentColor;
    box-shadow:0 0 10px currentColor;
    transition:0.3s;
}
.nav div:hover {
    transform:translateY(-4px);
    text-shadow:0 0 15px currentColor,0 0 25px currentColor;
    box-shadow:0 0 20px currentColor,0 0 40px currentColor;
}

/* Dark Mode Neon Glow */
body.dark-mode { background:#111; color:#0f0; }
body.dark-mode .set-item button:hover { background:#0a0; }
body.dark-mode .nav div:hover { text-shadow:0 0 15px #0f0,0 0 25px #0f0; box-shadow:0 0 20px #0f0,0 0 40px #0f0; }

.nav .active{
background:#ffffff;
color:#000;
font-weight:bold;
border-color:#00ffc8;
box-shadow:
0 0 10px rgba(0,255,200,.6);
transform:translateY(-2px);
transition:.25s ease;
}
/* NORMAL NAV */
.nav div{
transition:.25s ease;
}
/* HOVER */
.nav div:hover{
transform:translateY(-2px);
box-shadow:
0 0 12px currentColor;
}

</style>
</head>
<body>

<div class="title">⚙️ Settings ⚙️</div>

<!-- Dark Mode Toggle -->
<div class="set-item">
    <span>🌙 Dark Mode</span>
    <button id="darkToggle">Enable</button>
</div>

<!-- Text Color Picker -->
<div class="set-item">
    <span>🎨 Text Color</span>
    <input type="color" id="textColorPicker" value="#00ffc8">
</div>

<!-- Font Style Selector -->
<div class="set-item">
    <span>🅰️ Font Style</span>
    <select id="fontStyleSelect">
        <option value="'Orbitron', sans-serif">Orbitron</option>
        <option value="'Roboto', sans-serif">Roboto</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="Courier New, monospace">Courier New</option>
    </select>
</div>

<!-- App Info Button -->
<div class="set-item">
    <span>📱 App Info</span>
    <button onclick="window.location='appinfo.html'">View Info</button>
</div>

<!-- App PIN Lock -->
<div class="set-item">
    <span>🔐 App PIN Lock</span>
    <div>
        <button id="setPinBtn">Set PIN</button>
        <button id="removePinBtn" class="danger">Remove</button>
    </div>
</div>

<!-- Reset App -->
<div class="set-item">
    <span>⚠️ Reset App</span>
    <button class="danger" id="resetBtn">Clear</button>
</div>

<!-- Bottom Navigation -->
<div class="nav">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="goCategory()">📂 Category</div>
 <div class="active"onclick="location='settings.html'">⚙️ Settings</div>

</div>
</div>


<script>

// ===== FIXED: Bottom Nav Correct Functions =====
function goHome(){
    window.location = "index.html";
}
function goCategory(){
    window.location = "category.html";
}
function goSettings(){
    window.location = "settings.html";
}

// ===== SETTINGS LOGIC =====
function applySettings(){
    const dark = JSON.parse(localStorage.getItem('darkMode'));
    const color = localStorage.getItem('textColor') || '#0ff';
    const font = localStorage.getItem('fontStyle') || "'Orbitron', sans-serif";

    if(dark) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');

    document.body.style.color = color;
    document.body.style.fontFamily = font + ", 'Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif";

    document.querySelectorAll('.set-item, .nav div, .title').forEach(el=>{
        el.style.color = color;
        el.style.fontFamily = font + ", 'Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif";
    });

    document.getElementById('darkToggle').innerText = dark ? 'Disable' : 'Enable';
}

// Initialize settings on load
window.addEventListener('load', applySettings);
window.addEventListener('storage', applySettings); // live update

// Dark Mode Toggle
document.getElementById("darkToggle").onclick = function() {
    const dark = !JSON.parse(localStorage.getItem('darkMode'));
    localStorage.setItem('darkMode', dark);
    applySettings();
}

// Text Color Picker
document.getElementById("textColorPicker").addEventListener('input', function(){
    localStorage.setItem('textColor', this.value);
    applySettings();
});

// Font Style Selector
document.getElementById("fontStyleSelect").addEventListener('change', function(){
    localStorage.setItem('fontStyle', this.value);
    applySettings();
});

// Reset App
document.getElementById("resetBtn").onclick = function(){
    localStorage.clear();
    location.reload();
};
// ===== APP LOCK =====

// SET PIN
document.getElementById("setPinBtn").onclick = function () {
    let pin = prompt("Enter new PIN (Only numbers)");

    if(pin === null || pin.trim() === "") {
        alert("PIN not set!");
        return;
    }

    if(isNaN(pin)) {
        alert("PIN must be numbers only!");
        return;
    }

    localStorage.setItem("appPin", pin);
    alert("PIN Set Successfully!");
};

// REMOVE PIN
document.getElementById("removePinBtn").onclick = function () {
    if(localStorage.getItem("appPin")) {
        localStorage.removeItem("appPin");
        alert("PIN Removed!");
    } else {
        alert("No PIN found.");
    }
};
</script>

</body>
</html>
